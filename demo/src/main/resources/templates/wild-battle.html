<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野外战斗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .location-banner {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            backdrop-filter: blur(10px);
        }
        
        .battle-arena {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .battle-field {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
        }
        
        .pokemon-side {
            text-align: center;
            flex: 1;
        }
        
        .pokemon-image {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            background: linear-gradient(145deg, #f0f0f0, #e0e0e0);
            border-radius: 50%;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }
        
        .pokemon-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .pokemon-name {
            font-size: 20px;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 5px;
        }
        
        .pokemon-type {
            font-size: 14px;
            color: #636e72;
            margin-bottom: 10px;
        }
        
        .hp-bar, .mp-bar {
            margin-bottom: 8px;
        }
        
        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 3px;
        }
        
        .bar-container {
            width: 200px;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 0 auto;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            transition: width 0.3s;
        }
        
        .mp-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2980b9);
            transition: width 0.3s;
        }
        
        .vs-badge {
            font-size: 36px;
            font-weight: bold;
            color: #f39c12;
            padding: 0 20px;
        }
        
        .battle-log {
            background: #2d3436;
            color: #dfe6e9;
            padding: 20px;
            border-radius: 15px;
            height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .battle-log div {
            margin-bottom: 5px;
            padding: 3px 0;
        }
        
        .log-turn {
            color: #f39c12;
            font-weight: bold;
        }
        
        .log-player {
            color: #74b9ff;
        }
        
        .log-enemy {
            color: #ff7675;
        }
        
        .log-damage {
            color: #fdcb6e;
        }
        
        .log-heal {
            color: #55efc4;
        }
        
        .moves-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .move-btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .move-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .move-btn:disabled {
            background: #b2bec3;
            cursor: not-allowed;
        }
        
        .move-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .move-info {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-catch {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }
        
        .btn-escape {
            background: linear-gradient(135deg, #e17055, #d63031);
            color: white;
        }
        
        .btn-back {
            background: linear-gradient(135deg, #636e72, #2d3436);
            color: white;
        }
        
        .action-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .result-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        
        .result-title {
            font-size: 28px;
            margin-bottom: 20px;
        }
        
        .result-title.win {
            color: #27ae60;
        }
        
        .result-title.lose {
            color: #e74c3c;
        }
        
        .result-message {
            font-size: 16px;
            color: #636e72;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        
        .result-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        
        .pokeball-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .pokeball-option {
            padding: 8px 15px;
            border: 2px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .pokeball-option.selected {
            border-color: #667eea;
            background: #f0f3ff;
        }
        
        .pokeball-option:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .bgm-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1100;
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            background: rgba(255,255,255,0.92);
            color: #2d3436;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.18);
            backdrop-filter: blur(8px);
        }

        .bgm-toggle-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <button id="bgmToggleBtn" class="bgm-toggle-btn" type="button" onclick="toggleBgmMute()">音乐开启</button>
    <audio id="bgmPlayer" loop preload="auto"></audio>

    <div class="container">
        <div class="location-banner" id="locationBanner">
            正在野外探索...
        </div>
        
        <div class="battle-arena">
            <div class="battle-field">
                <div class="pokemon-side">
                    <div class="pokemon-image" id="playerImage">
                        <span id="playerEmoji">?</span>
                    </div>
                    <div class="pokemon-name" id="playerName">--</div>
                    <div class="pokemon-type" id="playerLevelText">等级: Lv.--</div>
                    <div class="pokemon-type" id="playerType">--</div>
                    <div class="hp-bar">
                        <div class="bar-label">
                            <span>HP</span>
                            <span id="playerHpText">--/--</span>
                        </div>
                        <div class="bar-container">
                            <div class="hp-fill" id="playerHpBar" style="width: 100%;"></div>
                        </div>
                    </div>
                    <div class="mp-bar">
                        <div class="bar-label">
                            <span>MP</span>
                            <span id="playerMpText">--/--</span>
                        </div>
                        <div class="bar-container">
                            <div class="mp-fill" id="playerMpBar" style="width: 100%;"></div>
                        </div>
                    </div>
                </div>
                
                <div class="vs-badge">VS</div>
                
                <div class="pokemon-side">
                    <div class="pokemon-image" id="enemyImage">
                        <span id="enemyEmoji">?</span>
                    </div>
                    <div class="pokemon-name" id="enemyName">--</div>
                    <div class="pokemon-type" id="enemyLevelText">等级: Lv.--</div>
                    <div class="pokemon-type" id="enemyType">--</div>
                    <div class="hp-bar">
                        <div class="bar-label">
                            <span>HP</span>
                            <span id="enemyHpText">--/--</span>
                        </div>
                        <div class="bar-container">
                            <div class="hp-fill" id="enemyHpBar" style="width: 100%;"></div>
                        </div>
                    </div>
                    <div class="mp-bar">
                        <div class="bar-label">
                            <span>MP</span>
                            <span id="enemyMpText">--/--</span>
                        </div>
                        <div class="bar-container">
                            <div class="mp-fill" id="enemyMpBar" style="width: 100%;"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="battle-log" id="battleLog">
                <div>战斗准备中...</div>
            </div>
            
            <div class="moves-container" id="movesContainer">
                <!-- 技能按钮将在这里生成 -->
            </div>
            
            <!-- 捕捉率显示 -->
            <div id="battleRates" style="text-align: center; margin: 15px 0; padding: 12px; background: linear-gradient(135deg, #f8f9fa, #e9ecef); border-radius: 10px; font-size: 14px; color: #495057; border: 1px solid #dee2e6;">
                <span>捕捉率 <strong id="catchRate" style="color: #e74c3c; font-size: 16px;">--</strong>%</span>
            </div>
            
            <div class="pokeball-selector" id="pokeballSelector">
                <button class="pokeball-option selected" data-type="BASIC" onclick="selectPokeBall('BASIC')">
                    初级球
                </button>
                <button class="pokeball-option" data-type="MEDIUM" onclick="selectPokeBall('MEDIUM')">
                    中级球
                </button>
                <button class="pokeball-option" data-type="ADVANCED" onclick="selectPokeBall('ADVANCED')">
                    高级球
                </button>
                <button class="pokeball-option" data-type="MASTER" onclick="selectPokeBall('MASTER')">
                    大师球
                </button>
            </div>
            
            <div class="action-buttons">
                <button class="action-btn btn-catch" onclick="catchPokemon()">捕捉</button>
                <button class="action-btn btn-escape" onclick="escapeBattle()">逃跑</button>
                <button class="action-btn" onclick="showSwitchPokemonModal()" style="background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white;">更换精灵</button>
                <button class="action-btn" onclick="showBattleItemModal()" style="background: linear-gradient(135deg, #27ae60, #229954); color: white;">使用道具</button>
            </div>
        </div>
    </div>
    
    <!-- 使用道具弹窗 -->
    <div class="result-modal" id="battleItemModal" style="display: none;">
        <div class="result-content" style="max-width: 600px; max-height: 80vh; overflow-y: auto;">
            <h2>使用恢复道具</h2>
            <div style="background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-radius: 12px; padding: 15px; margin: 15px 0; text-align: center;">
                <div style="font-size: 14px; color: #2e7d32;">选择道具对当前出战精灵使用</div>
            </div>
            <div id="battleItemContent" style="margin: 20px 0;">
                <p>加载中...</p>
            </div>
            <button class="result-btn" onclick="closeBattleItemModal()">关闭</button>
        </div>
    </div>
    
    <!-- 结果弹窗 -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-title" id="resultTitle">--</div>
            <div class="result-message" id="resultMessage">--</div>
            <button class="result-btn" onclick="closeResult()">确定</button>
        </div>
    </div>
    
    <!-- 更换精灵弹窗 -->
    <div class="result-modal" id="switchPokemonModal" style="display: none;">
        <div class="result-content" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
            <h2>更换出战精灵</h2>
            <div id="switchPokemonContent" style="margin: 20px 0;">
                <p>加载中...</p>
            </div>
            <button class="result-btn" onclick="closeSwitchPokemonModal()">取消</button>
        </div>
    </div>

    <script>
        let battleData = null;
        let selectedPokeBall = 'BASIC';
        let pokeBallCounts = {};
        const BGM_STORAGE_KEY = 'pokemon_game_bgm_muted';
        const BATTLE_BGM_SRC = '/audio/battle-bgm.mp3';

        // 获取属性中文名称
        function getTypeName(type) {
            const typeNames = { 'NORMAL': '普通', 'FIRE': '火', 'WATER': '水', 'GRASS': '草' };
            return typeNames[type] || type;
        }

        // 获取精灵球图标
        function getBallEmoji(type) {
            const emojis = { 'BASIC': '🔴', 'MEDIUM': '🟡', 'ADVANCED': '🔵', 'MASTER': '🟢' };
            return emojis[type] || '实';
        }

        // 获取精灵球名称
        function getBallName(type) {
            const names = { 'BASIC': '初级球', 'MEDIUM': '中级球', 'ADVANCED': '高级球', 'MASTER': '大师球' };
            return names[type] || type;
        }

        function isBgmMuted() {
            return localStorage.getItem(BGM_STORAGE_KEY) === 'true';
        }

        function updateBgmButton() {
            const btn = document.getElementById('bgmToggleBtn');
            if (!btn) return;
            btn.textContent = isBgmMuted() ? '音乐关闭' : '音乐开启';
        }

        async function playBgm() {
            const player = document.getElementById('bgmPlayer');
            if (!player) return;

            if (player.dataset.src !== BATTLE_BGM_SRC) {
                player.src = BATTLE_BGM_SRC;
                player.dataset.src = BATTLE_BGM_SRC;
            }

            player.volume = 0.35;
            player.muted = isBgmMuted();
            updateBgmButton();

            if (!player.muted) {
                try {
                    await player.play();
                } catch (e) {
                }
            }
        }

        function toggleBgmMute() {
            const nextMuted = !isBgmMuted();
            localStorage.setItem(BGM_STORAGE_KEY, String(nextMuted));

            const player = document.getElementById('bgmPlayer');
            if (player) {
                player.muted = nextMuted;
                if (!nextMuted) {
                    player.play().catch(() => {});
                }
            }

            updateBgmButton();
        }

        function initPageBgm() {
            updateBgmButton();
            playBgm();

            const tryStart = () => playBgm();
            window.addEventListener('click', tryStart, { once: true });
            window.addEventListener('keydown', tryStart, { once: true });
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    playBgm();
                }
            });
        }
        
        // 页面加载时初始化
        window.onload = function() {
            const savedData = sessionStorage.getItem('battleData');
            const locationName = sessionStorage.getItem('battleLocation');
            
            if (!savedData) {
                alert('战斗数据已失效，请重新选择地点');
                window.location.href = '/wild-map';
                return;
            }
            
            battleData = JSON.parse(savedData);
            
            if (locationName) {
                document.getElementById('locationBanner').textContent = `${locationName}`;
            }
            
            updateBattleDisplay(battleData);
            renderMoves(battleData.playerMoves);
            loadPokeBallCounts();
            updateBattleRates(); // 初始化捕捉率和逃跑率显示
        };
        
        // 更新战斗显示
        function updateBattleDisplay(data) {
            // 解析数据，兼容不同字段名
            const player = data.playerPokemon || {};
            const enemy = data.enemyPokemon || {};
            
            // 获取 HP/MP，兼容不同字段名
            const playerHp = parseInt(data.playerHp ?? player.currentHp ?? 0);
            const playerMaxHp = parseInt(data.playerMaxHp ?? player.maxHp ?? 1);
            const playerMp = parseInt(data.playerMp ?? player.currentMp ?? 0);
            const playerMaxMp = parseInt(data.playerMaxMp ?? player.maxMp ?? 1);
            const enemyHp = parseInt(data.enemyHp ?? enemy.currentHp ?? 0);
            const enemyMaxHp = parseInt(data.enemyMaxHp ?? enemy.maxHp ?? 1);
            const enemyMp = parseInt(data.enemyMp ?? enemy.currentMp ?? 0);
            const enemyMaxMp = parseInt(data.enemyMaxMp ?? enemy.maxMp ?? 1);
            
            // 玩家精灵
            document.getElementById('playerName').textContent = player.name || '未知';
            const playerEff = data.playerEffectiveness !== undefined ? data.playerEffectiveness : 1.0;
            const playerEffColor = getEffectivenessColor(playerEff);
            const playerEffText = formatEffectiveness(playerEff);
            document.getElementById('playerType').innerHTML = `${getTypeName(player.type || player.pokemonType)} <span style="color:${playerEffColor};font-weight:bold;">${playerEffText}</span>`;
            document.getElementById('playerLevelText').textContent = `等级: Lv.${player.level || 1}`;
            document.getElementById('playerHpText').textContent = `${playerHp}/${playerMaxHp}`;
            document.getElementById('playerHpBar').style.width = `${Math.min(100, Math.max(0, (playerHp / playerMaxHp) * 100))}%`;
            document.getElementById('playerMpText').textContent = `${playerMp}/${playerMaxMp}`;
            document.getElementById('playerMpBar').style.width = `${Math.min(100, Math.max(0, (playerMp / playerMaxMp) * 100))}%`;
            document.getElementById('playerImage').innerHTML = `<img src="/images/pokemon/${player.name}.png" alt="${player.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span>?</span>';">`;
            
            // 敌方精灵
            document.getElementById('enemyName').textContent = enemy.name || '未知';
            const enemyEff = data.enemyEffectiveness !== undefined ? data.enemyEffectiveness : 1.0;
            const enemyEffColor = getEffectivenessColor(enemyEff);
            const enemyEffText = formatEffectiveness(enemyEff);
            document.getElementById('enemyType').innerHTML = `${getTypeName(enemy.type || enemy.pokemonType)} <span style="color:${enemyEffColor};font-weight:bold;">${enemyEffText}</span>`;
            document.getElementById('enemyLevelText').textContent = `等级: Lv.${enemy.level || 1}`;
            document.getElementById('enemyHpText').textContent = `${enemyHp}/${enemyMaxHp}`;
            document.getElementById('enemyHpBar').style.width = `${Math.min(100, Math.max(0, (enemyHp / enemyMaxHp) * 100))}%`;
            document.getElementById('enemyMpText').textContent = `${enemyMp}/${enemyMaxMp}`;
            document.getElementById('enemyMpBar').style.width = `${Math.min(100, Math.max(0, (enemyMp / enemyMaxMp) * 100))}%`;
            document.getElementById('enemyImage').innerHTML = `<img src="/images/pokemon/${enemy.name}.png" alt="${enemy.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span>?</span>';">`;
            
            // 战斗日志
            if (data.battleLog) {
                const logDiv = document.getElementById('battleLog');
                logDiv.innerHTML = '';
                data.battleLog.forEach(log => {
                    const div = document.createElement('div');
                    div.textContent = log;
                    if (log.includes('回合')) div.className = 'log-turn';
                    else if (log.includes('【玩家】')) div.className = 'log-player';
                    else if (log.includes('【敌方】')) div.className = 'log-enemy';
                    else if (log.includes('伤害')) div.className = 'log-damage';
                    else if (log.includes('恢复') || log.includes('治疗')) div.className = 'log-heal';
                    logDiv.appendChild(div);
                });
                logDiv.scrollTop = logDiv.scrollHeight;
            }
        }
        
        function formatEffectiveness(value) {
            if (value === 2.0) return '*2.0';
            if (value === 0.5) return '*0.5';
            if (value === 1.0) return '*1.0';
            return '*' + Number(value || 1).toFixed(1);
        }

        function getEffectivenessColor(value) {
            if (value > 1.0) return '#27ae60';
            if (value < 1.0) return '#e74c3c';
            return '#7f8c8d';
        }
        // 渲染技能按钮
        function formatBattleBuffText(buffList) {
            if (!buffList || buffList.length === 0) {
                return '';
            }
            return `<div style="margin-top:4px;font-size:12px;color:#8e44ad;">\u72b6\u6001: ${buffList.join(' / ')}</div>`;
        }

        function getMoveSummary(move) {
            if (move.description) {
                return move.description;
            }
            return `\u5a01\u529b:${move.power ?? 0} | \u547d\u4e2d:${move.accuracy ?? 100}%`;
        }

        function renderMoves(moves, playerMp) {
            const container = document.getElementById('movesContainer');
            container.innerHTML = '';
            
            if (!moves || moves.length === 0) return;
            
            const currentMp = playerMp ?? battleData?.playerMp ?? 0;
            
            moves.forEach(move => {
                const btn = document.createElement('button');
                btn.className = 'move-btn';
                const mpCost = parseInt(move.mpCost) || 0;
                const canUse = currentMp >= mpCost;
                btn.disabled = !canUse;
                
                btn.innerHTML = `
                    <div class="move-name">${move.name || '\u672a\u77e5\u6280\u80fd'}</div>
                    <div class="move-info">${getMoveSummary(move)} | MP:${mpCost}</div>
                `;
                if (canUse) {
                    btn.onclick = () => useMove(move.id);
                }
                container.appendChild(btn);
            });
        }
        
        // 使用技能
        async function useMove(moveId) {
            try {
                const response = await fetch('/game/attack', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `moveId=${encodeURIComponent(moveId)}`
                });
                
                const data = await response.json();
                
                if (data.battleLog) {
                    battleData = { ...battleData, ...data };
                    updateBattleDisplay(battleData);
                    
                    // 获取当前玩家 MP 并重新渲染技能
                    const currentPlayerMp = data.playerMp ?? battleData.playerMp ?? 0;
                    renderMoves(data.playerMoves || battleData.playerMoves, currentPlayerMp);
                    
                    // 敌方 HP 变化后，刷新捕捉率和逃跑率
                    updateBattleRates();
                }
                
                // 检查是否需要强制换精灵
                if (data.forceSwitch) {
                    setTimeout(() => {
                        alert('当前精灵已失去战斗能力，请选择下一只出战精灵！');
                        showSwitchPokemonModal();
                    }, 500);
                    return;
                }
                
                if (data.battleOver) {
                    setTimeout(() => {
                        const isWin = data.winner === 'PLAYER' || data.winner === '玩家';
                        let message = isWin ? '🎉 战斗胜利！' : '💔 战斗失败...';
                        if (isWin && data.reward && data.reward > 0) {
                            message += `\n\n💰 获得 ${data.reward} 金币奖励！`;
                        }
                        if (data.totalExpGained && data.totalExpGained > 0) {
                            message += `\n\n✈️ 本次获得经验: ${data.totalExpGained}`;
                        }
                        if (data.lastLevelUp && data.lastLevelAfter) {
                            message += `\n\n🌟 精灵已升级至 Lv.${data.lastLevelAfter}！`;
                        }
                        alert(message);
                        window.location.href = '/wild-map';
                    }, 1000);
                }
            } catch (error) {
                console.error('攻击失败:', error);
            }
        }
        
        // 加载精灵球数量
        async function loadPokeBallCounts() {
            try {
                const response = await fetch('/game/inventory');
                const data = await response.json();
                pokeBallCounts = data.pokeBalls || {};
                updatePokeBallButtons();
            } catch (error) {
                console.error('加载精灵球数量失败:', error);
            }
        }
        
        // 更新精灵球按钮状态
        function updatePokeBallButtons() {
            const buttons = document.querySelectorAll('.pokeball-option');
            buttons.forEach(btn => {
                const type = btn.dataset.type;
                const count = pokeBallCounts[type] || 0;
                btn.disabled = count === 0;
                btn.textContent = `${getBallEmoji(type)} ${getBallName(type)} (${count})`;
            });
        }
        
        // 选择精灵球
        function selectPokeBall(type) {
            if (pokeBallCounts[type] === 0) return;
            selectedPokeBall = type;
            document.querySelectorAll('.pokeball-option').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.type === type);
            });
            // 切换精灵球后刷新捕捉率
            updateBattleRates();
        }
        
        // 更新捕捉率显示
        async function updateBattleRates() {
            try {
                const response = await fetch(`/game/battle/rates?ballType=${selectedPokeBall}`);
                const data = await response.json();
                document.getElementById('catchRate').textContent = data.catchRate.toFixed(1);
            } catch (error) {
                console.error('获取概率失败:', error);
            }
        }

        // 逃跑功能
        async function escapeBattle() {
            try {
                const response = await fetch('/game/escape', {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    alert(data.message || '成功逃跑！');
                    window.location.href = '/wild-map';
                } else {
                    alert(data.message || '逃跑失败！');
                    // 更新战斗状态（敌人可能会进攻）
                    if (data.battleLog) {
                        battleData = { ...battleData, ...data };
                        updateBattleDisplay(battleData);
                        if (data.playerMoves) {
                            battleData.playerMoves = data.playerMoves;
                            renderMoves(data.playerMoves, data.playerMp ?? battleData.playerMp ?? 0);
                        }
                        updateBattleRates();
                    }
                }
            } catch (error) {
                console.error('逃跑请求失败:', error);
                alert('网络错误，请重试');
            }
        }
        
        // 捕捉精灵
        async function catchPokemon() {
            try {
                const response = await fetch(`/game/catch?ballType=${selectedPokeBall}`, {
                    method: 'POST'
                });

                const data = await response.json();
                if (data.battleLog) {
                    battleData = { ...battleData, ...data };
                    updateBattleDisplay(battleData);
                }

                if (data.battleOver) {
                    setTimeout(() => {
                        const placementMessage = data.placement === 'storage'
                            ? '\n\n🏠 精灵已放入仓库（背包已满）'
                            : data.placement === 'sold'
                                ? '\n\n💰 精灵已自动卖出'
                                : '\n\n🎁 精灵已加入背包';
                        alert((data.message || '捕捉成功！') + placementMessage);
                        window.location.href = '/wild-map';
                    }, 300);
                    return;
                }

                alert(data.message || '捕捉失败！');
                if (data.playerMoves) {
                    battleData.playerMoves = data.playerMoves;
                    renderMoves(data.playerMoves, data.playerMp ?? battleData.playerMp ?? 0);
                }
                updateBattleRates();
            } catch (error) {
                console.error('捕捉失败:', error);
                alert('捕捉请求失败，请重试');
            }
        }

        async function useItemInBattle(itemType) {
            try {
                const response = await fetch(`/game/battle/use-item?itemType=${itemType}`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (!data.success) {
                    alert(data.message || '使用道具失败');
                    return;
                }

                closeBattleItemModal();
                // 更新战斗数据
                battleData.playerHp = data.newHp ?? battleData.playerHp;
                battleData.playerMp = data.newMp ?? battleData.playerMp;
                if (data.playerPokemon) {
                    battleData.playerPokemon = data.playerPokemon;
                }
                if (data.battleLog) {
                    battleData.battleLog = data.battleLog;
                }
                if (data.playerMoves) {
                    battleData.playerMoves = data.playerMoves;
                }
                // 刷新显示
                updateBattleDisplay(battleData);
                renderMoves(battleData.playerMoves, battleData.playerMp);
                updateBattleRates();
                alert(data.message || '使用道具成功');
            } catch (error) {
                console.error('使用道具失败:', error);
                alert('使用道具请求失败');
            }
        }

        // 显示更换精灵弹窗
        async function showSwitchPokemonModal() {
            const modal = document.getElementById('switchPokemonModal');
            const content = document.getElementById('switchPokemonContent');
            modal.style.display = 'flex';
            
            try {
                // 获取可切换的精灵列表
                const response = await fetch('/game/battle/switchable');
                const pokemons = await response.json();
                
                if (!Array.isArray(pokemons) || pokemons.length === 0) {
                    content.innerHTML = '<p style="color: #e74c3c; text-align: center; padding: 20px;">没有可更换的精灵</p>';
                    return;
                }
                
                let html = '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;">';
                
                for (const pokemon of pokemons) {
                    html += `
                        <div style="border: 2px solid #ddd; border-radius: 10px; padding: 15px; cursor: pointer; transition: all 0.3s;" 
                             onmouseover="this.style.borderColor='#667eea'; this.style.transform='scale(1.02)'" 
                             onmouseout="this.style.borderColor='#ddd'; this.style.transform='scale(1)'"
                             onclick="switchToPokemon(${pokemon.backpackId})">
                            <div style="font-weight: bold; font-size: 16px; margin-bottom: 8px;">${pokemon.name}</div>
                            <div style="font-size: 12px; color: #666; margin-bottom: 5px;">属性: ${getTypeName(pokemon.type)} | 等级: Lv.${pokemon.level || 1}</div>
                            <div style="font-size: 12px; color: #27ae60;">HP: ${pokemon.currentHp}/${pokemon.maxHp}</div>
                            <div style="font-size: 12px; color: #3498db;">MP: ${pokemon.currentMp}/${pokemon.maxMp}</div>
                        </div>
                    `;
                }
                
                html += '</div>';
                content.innerHTML = html;
            } catch (error) {
                console.error('加载精灵失败:', error);
                content.innerHTML = '<p style="color: #e74c3c; text-align: center; padding: 20px;">加载失败</p>';
            }
        }

        // 关闭更换精灵弹窗
        function closeSwitchPokemonModal() {
            document.getElementById('switchPokemonModal').style.display = 'none';
        }

        // 切换到指定精灵
        async function switchToPokemon(backpackId) {
            try {
                const response = await fetch('/game/battle/switch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `backpackId=${encodeURIComponent(backpackId)}`
                });
                
                const data = await response.json();
                
                if (data.success) {
                    closeSwitchPokemonModal();
                    battleData = { ...battleData, ...data };
                    updateBattleDisplay(battleData);
                    if (data.playerMoves) {
                        battleData.playerMoves = data.playerMoves;
                        renderMoves(data.playerMoves, data.playerMp ?? battleData.playerMp ?? 0);
                    }
                    updateBattleRates();
                    alert('更换精灵成功！');
                } else {
                    alert(data.message || '更换精灵失败');
                }
            } catch (error) {
                console.error('更换精灵失败:', error);
                alert('更换精灵请求失败');
            }
        }

        // 显示使用道具弹窗
        async function showBattleItemModal() {
            const modal = document.getElementById('battleItemModal');
            const content = document.getElementById('battleItemContent');
            modal.style.display = 'flex';
            
            try {
                const response = await fetch('/game/inventory');
                const data = await response.json();
                
                if (!data.healingItems) {
                    content.innerHTML = '<p style="text-align: center; color: #e74c3c;">加载道具失败</p>';
                    return;
                }
                
                const healingItems = data.healingItems;
                const itemConfigs = {
                    'LIFE_FRUIT': { name: '生命果', icon: '🍎', desc: '恢复50%HP', color: '#e74c3c' },
                    'BIG_LIFE_FRUIT': { name: '大生命果', icon: '🍏', desc: '恢复100%HP', color: '#27ae60' },
                    'ENERGY_STONE': { name: '能量石', icon: '💎', desc: '恢复50%MP', color: '#3498db' },
                    'BIG_ENERGY_STONE': { name: '大能量石', icon: '💎', desc: '恢复100%MP', color: '#9b59b6' },
                    'ESSENCE_GRASS': { name: '精华草', icon: '🌿', desc: '恢复50%HP和50%MP', color: '#00b894' },
                    'IMMORTAL_GRASS': { name: '神仙草', icon: '🌱', desc: '恢复100%HP和100%MP', color: '#f1c40f' }
                };
                
                let html = '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px;">';
                let hasItems = false;
                
                for (const [itemType, count] of Object.entries(healingItems)) {
                    if (count > 0 && itemConfigs[itemType]) {
                        hasItems = true;
                        const config = itemConfigs[itemType];
                        html += `
                            <div style="border: 2px solid ${config.color}; border-radius: 10px; padding: 15px; cursor: pointer; transition: all 0.3s;"
                                 onclick="useItemInBattle('${itemType}')"
                                 onmouseover="this.style.opacity='0.8'"
                                 onmouseout="this.style.opacity='1'">
                                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                                    <span style="font-size: 30px;">${config.icon}</span>
                                    <div style="font-weight: bold; font-size: 16px; color: ${config.color};">${config.name}</div>
                                </div>
                                <div style="font-size: 12px; color: #666; margin-bottom: 5px;">${config.desc}</div>
                                <div style="font-size: 14px; color: #333;">拥有: <strong>${count}</strong> 个</div>
                            </div>
                        `;
                    }
                }
                
                html += '</div>';
                
                if (!hasItems) {
                    html = '<p style="text-align: center; color: #7f8c8d; padding: 20px;">没有可使用的恢复道具</p>';
                }
                
                content.innerHTML = html;
            } catch (error) {
                console.error('加载道具失败:', error);
                content.innerHTML = '<p style="text-align: center; color: #e74c3c;">加载道具失败</p>';
            }
        }

        // 关闭使用道具弹窗
        function closeBattleItemModal() {
            document.getElementById('battleItemModal').style.display = 'none';
        }
        initPageBgm();
    </script>
</body>
</html>
